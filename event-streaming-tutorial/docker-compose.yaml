services:
  kafka:
    image: bitnami/kafka:3.6
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  model_service:
    build: ./model_service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  decision_engine:
    build: ./decision_engine
    ports:
      - "8001:8001"
    environment:
      - PORT=8001

  consumer:
    build: ./consumer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MODEL_SERVICE_URL=http://model_service:8000
      - DECISION_ENGINE_URL=http://decision_engine:8001
      - KAFKA_TOPIC=events
    depends_on:
      kafka:
        condition: service_healthy
      model_service:
        condition: service_started
      decision_engine:
        condition: service_started

  producer:
    build: ./producer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=events
      - EVENTS_PER_SEC=2
    depends_on:
      kafka:
        condition: service_healthy
