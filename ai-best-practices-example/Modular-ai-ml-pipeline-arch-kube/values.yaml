# =============================================================================
# AI/ML Pipeline Platform — Master Helm Values
# Deploy composable AI/ML pipelines on Kubernetes
# =============================================================================
# Usage:
#   helm install aiml-platform ./chart -f values.yaml
#   helm upgrade aiml-platform ./chart -f values.yaml -f overrides-production.yaml
# =============================================================================

global:
  imageRegistry: "registry.example.com/aiml"
  imageTag: "latest"
  storageClass: "gp3-encrypted"
  gpuType: "nvidia.com/gpu"
  # Enable/disable entire pipeline sections
  enableDataLayer: true
  enableEmbeddingLayer: true
  enableTrainingLayer: true
  enableServingLayer: true
  enableOrchestrationLayer: true
  enableMonitoringLayer: true

# =============================================================================
# NAMESPACE: aiml-data — Data Ingestion & Feature Engineering
# =============================================================================
dataLayer:
  streamIngestor:
    enabled: true
    replicas: 2
    image: stream-ingestor
    resources:
      requests: { memory: "512Mi", cpu: "500m" }
      limits: { memory: "2Gi", cpu: "2" }
    config:
      sources: ["kafka", "pubsub", "kinesis"]
      schemaValidation: true
      deadLetterQueue: true
      backpressure:
        maxInflight: 1000
        strategy: "pause"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilization: 70

  batchLoader:
    enabled: true
    schedule: "0 2 * * *"  # Daily at 2 AM
    image: batch-loader
    resources:
      requests: { memory: "1Gi", cpu: "1" }
      limits: { memory: "4Gi", cpu: "4" }
    config:
      sources: ["postgresql", "s3", "gcs", "bigquery"]
      incrementalLoad: true
      deduplication: true
      checkpointing: true

  dataTransformer:
    enabled: true
    replicas: 3
    image: data-transformer
    resources:
      requests: { memory: "1Gi", cpu: "1" }
      limits: { memory: "4Gi", cpu: "4" }
    config:
      operations: ["clean", "normalize", "tokenize", "augment", "validate"]
      mode: "streaming"  # or "batch"

  featureStore:
    online:
      enabled: true
      engine: "redis"
      replicas: 3
      resources:
        requests: { memory: "4Gi", cpu: "1" }
        limits: { memory: "8Gi", cpu: "2" }
      config:
        maxMemory: "6gb"
        evictionPolicy: "allkeys-lru"
        ttlSeconds: 86400
    offline:
      enabled: true
      engine: "delta-lake"
      resources:
        requests: { memory: "4Gi", cpu: "2" }
        limits: { memory: "16Gi", cpu: "8" }
      storage:
        size: "500Gi"
        path: "s3://feature-store/offline"

  dataVersioner:
    enabled: true
    replicas: 1
    image: data-versioner
    storage:
      size: "100Gi"

# =============================================================================
# NAMESPACE: aiml-embedding — Embedding & Retrieval
# =============================================================================
embeddingLayer:
  embeddingGenerator:
    enabled: true
    replicas: 2
    image: embedding-gen
    resources:
      requests: { memory: "4Gi", cpu: "2", "nvidia.com/gpu": "1" }
      limits: { memory: "8Gi", cpu: "4", "nvidia.com/gpu": "1" }
    config:
      model: "BAAI/bge-large-en-v1.5"
      vectorDim: 1024
      maxBatchSize: 64
      outputSink: "vector-store"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      metrics:
        - type: "gpu_utilization"
          target: 70

  vectorStore:
    enabled: true
    engine: "qdrant"  # or "weaviate", "milvus", "pinecone"
    replicas: 3
    resources:
      requests: { memory: "8Gi", cpu: "2" }
      limits: { memory: "32Gi", cpu: "8" }
    storage:
      size: "200Gi"
    config:
      indexType: "hnsw"
      efConstruction: 200
      m: 16
      replicationFactor: 2

  reranker:
    enabled: true
    replicas: 2
    image: reranker
    resources:
      requests: { memory: "4Gi", cpu: "1", "nvidia.com/gpu": "1" }
    config:
      model: "BAAI/bge-reranker-v2-m3"
      topK: 20

  retriever:
    enabled: true
    replicas: 2
    image: retriever
    config:
      hybridSearch: true
      bm25Weight: 0.3
      vectorWeight: 0.7
      rerankerEnabled: true

  ragEngine:
    enabled: true
    replicas: 2
    image: rag-engine
    config:
      chunkSize: 512
      chunkOverlap: 50
      maxContextTokens: 4096
      citationEnabled: true

# =============================================================================
# NAMESPACE: aiml-training — Model Training & Optimization
# =============================================================================
trainingLayer:
  distributedTrainer:
    enabled: true
    image: distributed-trainer
    config:
      framework: "pytorch"  # or "tensorflow", "jax"
      strategy: "deepspeed-zero3"  # or "fsdp", "ddp", "pipeline"
      mixedPrecision: "bf16"
      checkpointInterval: 500
      faultTolerance: true
    resources:
      master:
        replicas: 1
        gpu: 4
        memory: "64Gi"
      workers:
        replicas: 3
        gpu: 4
        memory: "64Gi"
      shmSize: "16Gi"

  fineTuner:
    enabled: true
    image: fine-tuner
    config:
      method: "qlora"  # or "lora", "full", "prefix-tuning"
      loraR: 16
      loraAlpha: 32
      loraDropout: 0.05
      targetModules: ["q_proj", "v_proj", "k_proj", "o_proj"]
      learningRate: 2.0e-4
      numEpochs: 3
      batchSize: 4
      gradientAccumulation: 8
    resources:
      gpu: 2
      memory: "32Gi"

  hparamTuner:
    enabled: true
    image: hparam-tuner
    config:
      algorithm: "bayesian"  # or "evolutionary", "grid", "random", "hyperband"
      maxTrials: 50
      parallelTrials: 5
      metric: "eval_loss"
      direction: "minimize"
      earlyStoppingRounds: 5

  rlTrainer:
    enabled: false  # Enable for RLHF workloads
    image: rl-trainer
    config:
      algorithm: "dpo"  # or "ppo", "kto", "orpo"
      rewardModel: "reward-model:latest"
      klCoefficient: 0.1
    resources:
      gpu: 4
      memory: "64Gi"

  modelOptimizer:
    enabled: true
    image: model-optimizer
    config:
      techniques: ["quantize", "prune", "distill"]
      quantization:
        method: "awq"  # or "gptq", "int8", "fp16"
        bits: 4
        groupSize: 128
      pruning:
        method: "magnitude"
        sparsity: 0.5

  experimentTracker:
    enabled: true
    image: experiment-tracker
    engine: "mlflow"
    replicas: 1
    resources:
      requests: { memory: "1Gi", cpu: "500m" }
    storage:
      artifacts: "s3://mlflow-artifacts"
      database: "postgresql://mlflow:5432/mlflow"

# =============================================================================
# NAMESPACE: aiml-serving — Model Serving & Inference
# =============================================================================
servingLayer:
  inferenceServer:
    enabled: true
    replicas: 2
    image: inference-server
    engine: "vllm"  # or "triton", "tgi", "bentoml", "ray-serve"
    resources:
      requests: { memory: "8Gi", cpu: "4", "nvidia.com/gpu": "1" }
      limits: { memory: "32Gi", cpu: "8", "nvidia.com/gpu": "1" }
    config:
      maxBatchSize: 32
      maxConcurrentRequests: 256
      tensorParallel: 1
      quantization: "awq"
      maxModelLen: 8192
      enableCudaGraph: true
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 20
      metrics:
        - type: "gpu_utilization"
          target: 70
        - type: "request_latency_p99_ms"
          target: 500
    healthCheck:
      liveness: { path: "/health", port: 8080, initialDelay: 30 }
      readiness: { path: "/ready", port: 8080, initialDelay: 15 }

  batchPredictor:
    enabled: true
    image: batch-predictor
    parallelism: 4
    config:
      inputPath: "s3://batch-input"
      outputPath: "s3://batch-output"
      checkpointing: true

  streamPredictor:
    enabled: false
    image: stream-predictor
    config:
      inputTopic: "inference-requests"
      outputTopic: "inference-results"
      windowSize: "5s"

  modelRouter:
    enabled: true
    replicas: 2
    image: model-router
    config:
      strategy: "weighted"  # or "canary", "ab-test", "ensemble"
      routes:
        - name: "production"
          weight: 90
          backend: "inference-server-v1"
        - name: "canary"
          weight: 10
          backend: "inference-server-v2"

  cacheLayer:
    enabled: true
    engine: "redis"
    replicas: 3
    config:
      maxMemory: "8gb"
      ttlSeconds: 3600
      cacheTypes: ["embedding", "kv-cache", "prediction"]

  apiGateway:
    enabled: true
    replicas: 2
    image: api-gateway
    config:
      rateLimiting:
        requestsPerMinute: 1000
        burstSize: 100
      authentication: "jwt"
      cors: true

# =============================================================================
# NAMESPACE: aiml-orchestration — Pipeline & Agent Orchestration
# =============================================================================
orchestrationLayer:
  pipelineOrchestrator:
    enabled: true
    engine: "argo-workflows"  # or "kubeflow-pipelines", "airflow"
    replicas: 2
    config:
      maxParallelWorkflows: 20
      defaultTimeout: "6h"
      retryPolicy:
        limit: 3
        retryOn: "Always"

  agentRouter:
    enabled: true
    replicas: 2
    image: agent-router
    config:
      maxAgents: 10
      maxTurns: 20
      delegationEnabled: true
      toolTimeout: "30s"

  toolRegistry:
    enabled: true
    replicas: 1
    image: tool-registry
    config:
      discoveryMode: "auto"
      schemaValidation: true
      authRequired: true
      tools:
        - name: "web-search"
          type: "http"
          endpoint: "https://api.search.example.com"
        - name: "code-interpreter"
          type: "container"
          image: "aiml/code-interpreter:latest"
        - name: "database-query"
          type: "grpc"
          endpoint: "db-tool.aiml-orchestration.svc:50051"

  promptManager:
    enabled: true
    replicas: 1
    image: prompt-mgr
    config:
      versionControl: true
      abTesting: true
      templateEngine: "jinja2"
    storage:
      size: "10Gi"

  memoryStore:
    enabled: true
    engine: "redis"
    replicas: 2
    config:
      maxMemory: "4gb"
      sessionTTL: 3600
      longTermStorage: "postgresql"

# =============================================================================
# NAMESPACE: aiml-monitoring — Observability & Safety
# =============================================================================
monitoringLayer:
  driftDetector:
    enabled: true
    schedule: "0 */6 * * *"
    image: drift-detector
    config:
      tests: ["ks", "psi", "wasserstein", "chi2"]
      threshold: 0.05
      referenceDataset: "s3://data/reference.parquet"
      alertWebhook: "https://hooks.slack.com/services/..."

  perfMonitor:
    enabled: true
    image: perf-monitor
    daemonSet: true  # Runs on every node
    config:
      collectGPUMetrics: true
      collectInferenceLatency: true
      collectThroughput: true
      prometheusEnabled: true
      grafanaDashboards: true
      alerts:
        latencyP99Ms: 500
        errorRatePercent: 1
        gpuUtilizationMin: 20

  safetyFilter:
    enabled: true
    replicas: 3
    image: safety-filter
    resources:
      requests: { memory: "2Gi", cpu: "1", "nvidia.com/gpu": "1" }
    config:
      toxicityThreshold: 0.7
      piiDetection: true
      promptInjectionGuard: true
      hallucinationCheck: true
      contentPolicy: "strict"

  abController:
    enabled: true
    replicas: 1
    image: ab-controller
    config:
      statisticalTest: "bayesian"  # or "frequentist"
      minSampleSize: 1000
      confidenceLevel: 0.95

  modelRegistry:
    enabled: true
    replicas: 1
    image: model-registry
    storage:
      size: "500Gi"
    config:
      stages: ["development", "staging", "production", "archived"]
      approvalRequired: true
      lineageTracking: true

  alerting:
    enabled: true
    replicas: 1
    image: alerting
    config:
      channels: ["slack", "pagerduty", "email"]
      escalationPolicy:
        warning: "slack"
        critical: "pagerduty"
        fatal: "pagerduty+email"
