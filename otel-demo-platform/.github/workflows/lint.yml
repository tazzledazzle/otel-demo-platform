# Lint: check each commit for common coding mistakes.
# Python: ruff (pyflakes + pycodestyle).  Kotlin: ktlint via Gradle.

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.9.0"

      - name: Run ruff
        working-directory: otel-demo-platform
        run: ruff check agent/agent/ agent/tests/

  lint-kotlin:
    name: Lint Kotlin (ktlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run ktlintCheck
        working-directory: otel-demo-platform
        run: ./gradlew ktlintCheck --no-daemon
